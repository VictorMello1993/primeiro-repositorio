name: primeira-pipeline
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  primeiro-job:  
    name: "Meu primeiro Job"
    runs-on: ubuntu-latest
    steps:
      - name: "Minha primeira action"
        run: echo "Hello World !!!"
      - name: "Minha segunda action"
        run: |  
          echo "Você criou o seu primeiro workflow !!!"
          echo "Parabéns"
      - name: "Script python"
        run: |
          var = "Hello World !!!"
          print(var)
        shell: python
  segundo-job:
    name: "Instalação do ambiente Node.js"
    runs-on: ubuntu-latest
    needs: [primeiro-job] #O segundo job só irá executar depois do sucesso da execução do primeiro job
    steps:
      - name: "Verificação da versão do Node.js atual"
        run: node --version        
      - name: "Definição da versão 24.14.0 LTS do Node.js"
        uses: actions/setup-node@v6
        with: 
         node-version: "24.14.0"         
      - name: "Verificação da versão do Node.js depois de instalar"
        run: node --version
